<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wörtle — German Wordle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─────────────────────────────── */
    :root {
      --color-bg:               #ffffff;
      --color-surface:          #f8f8f8;
      --color-border:           #d3d6da;
      --color-text:             #1a1a2e;
      --color-text-inv:         #ffffff;
      --color-text-muted:       #6b7280;
      --color-correct:          #1D9E75;
      --color-present:          #EF9F27;
      --color-absent:           #787c7e;
      --color-absent-bg:        #787c7e;
      --color-key-bg:           #d3d6da;
      --color-key-text:         #1a1a2e;
      --color-tile-border:      #d3d6da;
      --color-tile-filled:      #878a8c;
      --color-header-bg:        #ffffff;
      --color-header-border:    #d3d6da;
      --color-badge-noun:       #3b82f6;
      --color-badge-verb:       #1D9E75;
      --color-badge-adj:        #EF9F27;
      --color-tab-active-bg:    #1a1a2e;
      --color-tab-active-text:  #ffffff;
      --color-streak-bg:        #f0fdf4;
      --color-streak-border:    #bbf7d0;
      --tile-size:              62px;
      --word-len:               5;
      --color-p1:               #3b82f6;
      --color-p2:               #ef4444;
      --cell-size:              120px;
      --cw-cell:                36px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:              #121213;
        --color-surface:         #1a1a1b;
        --color-border:          #3a3a3c;
        --color-text:            #ffffff;
        --color-text-muted:      #818384;
        --color-absent:          #3a3a3c;
        --color-absent-bg:       #3a3a3c;
        --color-key-bg:          #818384;
        --color-key-text:        #ffffff;
        --color-tile-border:     #3a3a3c;
        --color-tile-filled:     #565758;
        --color-header-bg:       #121213;
        --color-header-border:   #3a3a3c;
        --color-tab-active-bg:   #ffffff;
        --color-tab-active-text: #121213;
        --color-streak-bg:       #052e16;
        --color-streak-border:   #166534;
      }
    }

    /* ─── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── Hidden utility ─────────────────────────────── */
    .hidden { display: none !important; }

    /* ─── Header ────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-header-border);
      background: var(--color-header-bg);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 8px;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-text);
      user-select: none;
      flex-shrink: 0;
    }

    /* ─── Mode Toggle ───────────────────────────────── */
    .mode-toggle {
      display: flex;
      gap: 4px;
      border: 2px solid var(--color-border);
      border-radius: 999px;
      padding: 2px;
      flex-shrink: 0;
    }

    .mode-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active {
      background: var(--color-tab-active-bg);
      color: var(--color-tab-active-text);
    }

    .level-tabs {
      display: flex;
      gap: 6px;
    }

    .tab, .type-tab {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 2px solid var(--color-border);
      border-radius: 999px;
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .tab.active, .type-tab.active {
      background: var(--color-tab-active-bg);
      color: var(--color-tab-active-text);
      border-color: var(--color-tab-active-bg);
    }

    /* ─── Hint bar ──────────────────────────────────── */
    .hint-bar {
      width: 100%;
      max-width: 600px;
      padding: 8px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      min-height: 44px;
    }

    .hint-en {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-text);
    }

    .hint-sep {
      color: var(--color-text-muted);
      font-size: 0.75rem;
    }

    .hint-ar {
      font-size: 0.9rem;
      color: var(--color-text);
      direction: rtl;
      unicode-bidi: isolate;
    }

    .hint-sentence {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      font-style: italic;
      flex-basis: 100%;
    }

    .type-badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 999px;
      color: #fff;
      text-transform: capitalize;
      margin-left: auto;
    }

    .type-badge.noun      { background: var(--color-badge-noun); }
    .type-badge.verb      { background: var(--color-badge-verb); }
    .type-badge.adjective { background: var(--color-badge-adj); color: #1a1a2e; }

    /* ─── Wordle Panel ───────────────────────────────── */
    #wordle-panel {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    /* Slide-up modal in 2P mode */
    #wordle-panel:not(.inline-mode) {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 100%;
      max-height: 92dvh;
      background: var(--color-bg);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.25);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 50;
      overflow-y: auto;
    }

    #wordle-panel:not(.inline-mode).visible {
      transform: translateY(0);
    }

    /* ─── Panel Header (2P) ──────────────────────────── */
    .panel-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 8px;
      position: sticky;
      top: 0;
      background: var(--color-bg);
      z-index: 1;
      border-bottom: 1px solid var(--color-border);
    }

    .panel-player-badge {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 999px;
      color: #fff;
    }

    .panel-close-btn {
      font-size: 1rem;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .panel-close-btn:hover { background: var(--color-border); }

    /* Panel backdrop */
    #panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    #panel-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Grid container ─────────────────────────────── */
    .grid-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 8px 8px;
      width: 100%;
    }

    #grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .grid-row {
      display: flex;
      gap: 4px;
      border-left: 3px solid transparent;
      padding-left: 5px;
      border-radius: 3px 0 0 3px;
      transition: border-color 0.2s;
    }

    .grid-row.row-owner-p1 { border-left-color: var(--color-p1); }
    .grid-row.row-owner-p2 { border-left-color: var(--color-p2); }
    .grid-row.active-row .tile:not(.correct):not(.present):not(.absent):not(.skipped) {
      border-color: var(--color-text-muted);
    }

    .tile.skipped {
      color: var(--color-text-muted);
      border-color: var(--color-border);
      font-size: calc(var(--tile-size) * 0.35);
    }

    .skip-btn {
      align-self: center;
      padding: 8px 22px;
      border-radius: 999px;
      border: 2px solid var(--color-border);
      background: transparent;
      color: var(--color-text);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .skip-btn:hover { background: var(--color-surface); border-color: var(--color-text-muted); }

    /* ─── Tile ───────────────────────────────────────── */
    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border: 2px solid var(--color-tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--tile-size) * 0.5);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      color: var(--color-text);
      background: transparent;
      text-transform: uppercase;
      user-select: none;
      transition: border-color 0.1s;
      transform-style: preserve-3d;
      position: relative;
    }

    .tile[data-letter] { border-color: var(--color-tile-filled); }

    .tile.correct { background: var(--color-correct); border-color: var(--color-correct); color: #fff; }
    .tile.present { background: var(--color-present); border-color: var(--color-present); color: #fff; }
    .tile.absent  { background: var(--color-absent-bg); border-color: var(--color-absent-bg); color: #fff; }

    /* ─── Animations ─────────────────────────────────── */
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-5px); }
      30%       { transform: translateX(5px); }
      45%       { transform: translateX(-4px); }
      60%       { transform: translateX(4px); }
      75%       { transform: translateX(-2px); }
      90%       { transform: translateX(2px); }
    }

    @keyframes flipIn {
      0%   { transform: rotateX(0deg); }
      50%  { transform: rotateX(-90deg); }
    }

    @keyframes flipOut {
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40%      { transform: translateY(-20px); }
      60%      { transform: translateY(-10px); }
    }

    .tile.pop      { animation: pop 0.1s ease; }
    .tile.flipping { animation: flipIn 0.25s ease forwards; }
    .tile.flipped  { animation: flipOut 0.25s ease forwards; }
    .tile.bounce   { animation: bounce 0.5s ease; }

    .row-shake { animation: shake 0.5s ease; }

    /* ─── Message ─────────────────────────────────────── */
    #message {
      min-height: 36px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 6px 16px;
      text-align: center;
      border-radius: 6px;
      transition: opacity 0.3s;
    }

    #message.win  { color: var(--color-correct); }
    #message.lose { color: #ef4444; }

    /* ─── Keyboard ───────────────────────────────────── */
    #keyboard {
      width: 100%;
      max-width: 580px;
      padding: 8px 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .kb-row {
      display: flex;
      gap: 5px;
      justify-content: center;
      width: 100%;
    }

    .key {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      height: 56px;
      min-width: 34px;
      flex: 1;
      max-width: 42px;
      border: none;
      border-radius: 6px;
      background: var(--color-key-bg);
      color: var(--color-key-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .key.wide {
      font-size: 0.7rem;
      min-width: 52px;
      max-width: 64px;
    }

    .key.correct { background: var(--color-correct); color: #fff; }
    .key.present { background: var(--color-present); color: #fff; }
    .key.absent  { background: var(--color-absent);  color: #fff; }

    /* ─── Streak bar ─────────────────────────────────── */
    .streak-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 8px 16px 12px;
      font-size: 0.82rem;
      color: var(--color-text-muted);
      background: var(--color-streak-bg);
      border-top: 1px solid var(--color-streak-border);
      margin-top: auto;
    }

    .streak-bar span {
      font-weight: 500;
      color: var(--color-correct);
    }

    /* ─── Loading / Error state ──────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      font-size: 1rem;
      color: var(--color-text-muted);
      z-index: 100;
    }

    #loading.hidden { display: none; }

    /* ─── 2P Board ───────────────────────────────────── */
    #board-2p {
      width: 100%;
      max-width: 600px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .turn-banner {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 999px;
      color: #fff;
      align-self: center;
      min-width: 160px;
      transition: background 0.3s;
    }

    .turn-banner.p1 { background: var(--color-p1); }
    .turn-banner.p2 { background: var(--color-p2); }

    .score-strip {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .score-label {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 999px;
      color: #fff;
      flex: 1;
      text-align: center;
    }

    .score-label.p1 { background: var(--color-p1); }
    .score-label.p2 { background: var(--color-p2); }

    /* ─── Cell Grid ──────────────────────────────────── */
    #cell-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: var(--cell-size);
      gap: 8px;
      width: 100%;
    }

    .board-cell {
      border-radius: 12px;
      padding: 10px;
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.3s;
      cursor: default;
      min-width: 0;
      overflow: hidden;
    }

    .board-cell.win-line-p1 { box-shadow: 0 0 0 3px var(--color-p1), 0 0 12px rgba(59,130,246,0.4); }
    .board-cell.win-line-p2 { box-shadow: 0 0 0 3px var(--color-p2), 0 0 12px rgba(239,68,68,0.4); }

    .board-cell.playable { cursor: pointer; }

    .board-cell.playable:hover {
      border-color: var(--color-text-muted);
      transform: translateY(-2px);
    }

    .board-cell.playable:active { transform: translateY(0); }

    .board-cell.owned-p1 {
      background: rgba(59, 130, 246, 0.12);
      border-color: var(--color-p1);
    }

    .board-cell.owned-p2 {
      background: rgba(239, 68, 68, 0.12);
      border-color: var(--color-p2);
    }

    .board-cell.failed {
      background: var(--color-surface);
      border-color: var(--color-border);
      opacity: 0.45;
    }

    .cell-length-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cell-hint-text {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-word-reveal {
      font-size: 0.72rem;
      color: var(--color-text-muted);
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-owner-badge {
      font-size: 0.65rem;
      font-weight: 500;
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
      align-self: flex-start;
      margin-top: 4px;
    }

    .cell-owner-badge.p1 { background: var(--color-p1); }
    .cell-owner-badge.p2 { background: var(--color-p2); }

    /* ─── Overlays ───────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 60;
      padding: 16px;
    }

    .overlay-card {
      background: var(--color-bg);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .overlay-title {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      color: var(--color-text);
    }

    /* ─── Setup Overlay ──────────────────────────────── */
    .setup-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .setup-fields label {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .player-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .p1-label { color: var(--color-p1); }
    .p2-label { color: var(--color-p2); }

    .setup-fields input {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 2px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s;
    }

    .setup-fields input:focus { border-color: var(--color-text-muted); }

    .start-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: var(--color-correct);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .start-btn:hover  { opacity: 0.88; }
    .start-btn:active { transform: scale(0.97); }

    .cancel-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 24px;
      border: 2px solid var(--color-border);
      border-radius: 999px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .cancel-btn:hover { border-color: var(--color-text-muted); color: var(--color-text); }

    /* ─── Results Overlay ────────────────────────────── */
    .results-winner {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }

    .results-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--color-surface);
      border-radius: 8px;
      font-size: 0.85rem;
      gap: 8px;
    }

    .breakdown-name { font-weight: 500; }

    .breakdown-score {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .results-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── Mobile ─────────────────────────────────────── */
    @media (max-width: 400px) {
      :root { --cell-size: 88px; }
      .key { height: 48px; min-width: 28px; max-width: 36px; font-size: 0.7rem; }
      .key.wide { min-width: 44px; max-width: 54px; font-size: 0.62rem; }
      .cell-hint-text { font-size: 0.72rem; }
    }

    /* ─── Crossword ──────────────────────────────────── */
    #crossword-area {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      max-width: 900px;
      width: 100%;
      padding: 12px 16px;
      margin: 0 auto;
    }

    #crossword-grid-container { overflow: auto; flex-shrink: 0; }

    #crossword-grid { display: grid; gap: 2px; }

    .cw-cell {
      width: var(--cw-cell); height: var(--cw-cell);
      position: relative;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
    }

    .cw-cell.black { background: #2a2a2a; border-color: #2a2a2a; cursor: default; }
    .cw-cell.word-hl { background: var(--color-surface); }
    .cw-cell.cell-hl { background: #bde0ff; }
    .cw-cell.correct { background: var(--color-correct); }
    .cw-cell.wrong   { background: var(--color-present); }
    .cw-cell.revealed { opacity: 0.7; }

    .cw-number {
      position: absolute; top: 1px; left: 2px;
      font-size: calc(var(--cw-cell) * 0.28);
      font-family: 'DM Mono', monospace;
      color: var(--color-text-muted);
      line-height: 1; pointer-events: none;
    }

    .cw-letter {
      font-size: calc(var(--cw-cell) * 0.55);
      font-weight: 500; font-family: 'DM Mono', monospace;
      color: var(--color-text); text-transform: uppercase;
      pointer-events: none;
    }

    .cw-cell.correct .cw-letter,
    .cw-cell.correct .cw-number { color: #fff; }

    /* Clues panel */
    #clues-panel {
      flex: 1; min-width: 180px; max-width: 260px;
      max-height: 60vh; overflow-y: auto;
    }

    .clues-heading {

    .clue-num { font-weight: 600; min-width: 22px; }

    /* CW action buttons */

      display: flex; gap: 8px; justify-content: center;

    #check-btn, #reveal-btn, #new-puzzle-btn {

    @media (max-width: 680px) {

    }
  </style>

<script>
// ─── State ────────────────────────────────────────────
let words        = {};
let currentLevel = 'A1';
let gameOver     = false;
let streak       = { current: 0, best: 0 };
let animating    = false;

// ─── 1P Crossword state ───────────────────────────────
let currentPuzzle = null;   // { grid, words, bbox }
let selectedCell  = null;   // { r, c }
let selectedDir   = 'across';
let usedReveal    = false;

// ─── 2P Wordle state (kept for 2P mode) ───────────────
let currentWord  = null;
let currentRow   = 0;
let board        = [];
let keyColors    = {};

// ─── 2P State ─────────────────────────────────────────
const WIN_SCORE_2P = 3;
let gameMode         = '1P';
let players          = [
  { name: 'Player 1', color: '#3b82f6', score: 0 },
  { name: 'Player 2', color: '#ef4444', score: 0 },
];
let activePlayer     = 0;
let roundStartPlayer = 0;
let rowOwner         = [];

// ─── Keyboard layout ──────────────────────────────────
const KB_ROWS = [
  ['Q','W','E','R','T','Z','U','I','O','P','Ü'],
  ['A','S','D','F','G','H','J','K','L','Ö','Ä'],
  ['ENTER','Y','X','C','V','B','N','M','⌫'],
];

// ─── Utils ────────────────────────────────────────────
function norm(ch) {
  const map = { 'ä':'Ä','ö':'Ö','ü':'Ü','ß':'ß' };
  return map[ch] || ch.toUpperCase();
}

function computeTileSize(wordLen) {
  const vw  = Math.min(window.innerWidth, 580);
  const gap = 4;
  const pad = 16;
  const avail = vw - 2 * pad - (wordLen - 1) * gap;
  return Math.min(Math.floor(avail / wordLen), 62);
}

function setTileSize(wordLen) {
  const size = computeTileSize(wordLen);
  document.documentElement.style.setProperty('--tile-size', size + 'px');
  document.documentElement.style.setProperty('--word-len', wordLen);
}

// ─── Streak persistence ───────────────────────────────
function loadStreak() {
  try {
    const s = JSON.parse(localStorage.getItem('wortle-streak') || '{}');
    streak.current = s.current || 0;
    streak.best    = s.best    || 0;
  } catch {}
  renderStreak();
}

function saveStreak() {
  localStorage.setItem('wortle-streak', JSON.stringify(streak));
  renderStreak();
}

function renderStreak() {
  document.getElementById('streak-current').textContent = streak.current;
  document.getElementById('streak-best').textContent    = streak.best;
}

// ─── Word picking ─────────────────────────────────────
function pickWord(level, type) {
  let pool = words[level] || [];
  if (type !== 'all') pool = pool.filter(e => e.type === type);
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ─── Crossword generator ──────────────────────────────
const CW_GRID  = 15;
const CW_MIN   = 4;
const CW_MAX   = 10;
const CW_COUNT = 12;

function cwShuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function cwMakeGrid() {
  return Array.from({ length: CW_GRID }, () => Array(CW_GRID).fill(null));
}

function cwCanPlace(grid, wordStr, r, c, dir) {
  const len = wordStr.length;
  const dr = dir === 'down' ? 1 : 0;
  const dc = dir === 'across' ? 1 : 0;

  // pre-cell must be empty
  const pr = r - dr, pc = c - dc;
  if (pr >= 0 && pc >= 0 && grid[pr][pc] !== null) return false;
  // post-cell must be empty
  const er = r + dr * len, ec = c + dc * len;
  if (er < CW_GRID && ec < CW_GRID && grid[er][ec] !== null) return false;

  let hasIntersect = false;
  for (let i = 0; i < len; i++) {
    const rr = r + dr * i, cc = c + dc * i;
    if (rr < 0 || rr >= CW_GRID || cc < 0 || cc >= CW_GRID) return false;

    const cell = grid[rr][cc];
    if (cell !== null) {
      // Must match existing letter
      if (cell.letter !== wordStr[i]) return false;
      hasIntersect = true;
    } else {
      // Adjacent parallel cells must be empty (no side-by-side words)
      const s1r = rr - dc, s1c = cc - dr;
      const s2r = rr + dc, s2c = cc + dr;
      if (s1r >= 0 && s1r < CW_GRID && s1c >= 0 && s1c < CW_GRID && grid[s1r][s1c] !== null) return false;
      if (s2r >= 0 && s2r < CW_GRID && s2c >= 0 && s2c < CW_GRID && grid[s2r][s2c] !== null) return false;
    }
  }
  return hasIntersect;
}

function cwPlace(grid, wordStr, r, c, dir) {
  const dr = dir === 'down' ? 1 : 0;
  const dc = dir === 'across' ? 1 : 0;
  for (let i = 0; i < wordStr.length; i++) {
    const rr = r + dr * i, cc = c + dc * i;
    if (grid[rr][cc] === null) {
      grid[rr][cc] = { letter: wordStr[i], filled: '', acrossId: null, downId: null, number: null };
    }
  }
}

function cwBbox(grid) {
  let minR = CW_GRID, maxR = -1, minC = CW_GRID, maxC = -1;
  for (let r = 0; r < CW_GRID; r++)
    for (let c = 0; c < CW_GRID; c++)
      if (grid[r][c] !== null) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      }
  return { minR, maxR, minC, maxC };
}

function generateCrossword(pool) {
  const eligible = pool.filter(e => e.w.length >= CW_MIN && e.w.length <= CW_MAX);
  if (eligible.length < 5) return null;

  for (let attempt = 0; attempt < 3; attempt++) {
    const shuffled = cwShuffle(eligible);
    const grid     = cwMakeGrid();
    const placed   = [];

    // Place first word horizontally at center
    const first = shuffled[0];
    const startC = Math.floor((CW_GRID - first.w.length) / 2);
    const startR = Math.floor(CW_GRID / 2);
    cwPlace(grid, first.w, startR, startC, 'across');
    placed.push({ entry: first, dir: 'across', row: startR, col: startC, number: null, solved: false });

    // Try to add remaining words
    for (let wi = 1; wi < shuffled.length && placed.length < CW_COUNT; wi++) {
      const entry  = shuffled[wi];
      const word   = entry.w;
      const oppDir = placed.length % 2 === 0 ? 'across' : 'down';
      let found    = false;

      outer:
      for (let i = 0; i < word.length && !found; i++) {
        for (let r = 0; r < CW_GRID && !found; r++) {
          for (let c = 0; c < CW_GRID && !found; c++) {
            if (grid[r][c] === null || grid[r][c].letter !== word[i]) continue;
            // Try perpendicular placement through this cell
            for (const dir of [oppDir, oppDir === 'across' ? 'down' : 'across']) {
              const dr = dir === 'down' ? 1 : 0;
              const dc = dir === 'across' ? 1 : 0;
              const pr = r - dr * i, pc = c - dc * i;
              if (pr < 0 || pc < 0) continue;
              if (cwCanPlace(grid, word, pr, pc, dir)) {
                cwPlace(grid, word, pr, pc, dir);
                placed.push({ entry, dir, row: pr, col: pc, number: null, solved: false });
                found = true;
                break;
              }
            }
          }
        }
      }
    }

    if (placed.length < 5) continue;

    // Number cells in reading order
    // First assign word starts then number them
    const bbox = cwBbox(grid);
    // Renumber based on bbox-adjusted reading order
    let num = 1;
    for (let r = 0; r < CW_GRID; r++) {
      for (let c = 0; c < CW_GRID; c++) {
        if (grid[r][c] === null) continue;
        const startsAcross = (c === 0 || grid[r][c-1] === null) &&
                              c + 1 < CW_GRID && grid[r][c+1] !== null;
        const startsDown   = (r === 0 || grid[r-1][c] === null) &&
                              r + 1 < CW_GRID && grid[r+1][c] !== null;
        if (startsAcross || startsDown) {
          grid[r][c].number = num;
          placed
            .filter(pw => pw.row === r && pw.col === c)
            .forEach(pw => { pw.number = num; });
          num++;
        }
      }
    }

    // Tag each cell with its word IDs
    for (const pw of placed) {
      const dr = pw.dir === 'down' ? 1 : 0;
      const dc = pw.dir === 'across' ? 1 : 0;
      for (let i = 0; i < pw.entry.w.length; i++) {
        const rr = pw.row + dr * i, cc = pw.col + dc * i;
        if (pw.dir === 'across') grid[rr][cc].acrossId = pw.number;
        else                      grid[rr][cc].downId   = pw.number;
      }
    }

    return { grid, words: placed, bbox };
  }
  return null;
}

// ─── Render hint bar ──────────────────────────────────
function renderHint(entry, usePanel) {
  const p = usePanel ? 'panel-' : '';
  document.getElementById(p + 'hint-en').textContent       = entry.en;
  document.getElementById(p + 'hint-ar').textContent       = entry.ar;
  document.getElementById(p + 'hint-sentence').textContent = entry.hint;
  const badge = document.getElementById(p + 'type-badge');
  badge.textContent = entry.type;
  badge.className   = 'type-badge ' + entry.type;
}

// ─── Build grid ───────────────────────────────────────
function buildGrid(wordLen) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  board = Array.from({ length: 6 }, () => []);

  for (let r = 0; r < 6; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'grid-row';
    rowEl.id = `grid-row-${r}`;
    for (let c = 0; c < wordLen; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      rowEl.appendChild(tile);
    }
    grid.appendChild(rowEl);
  }
}

function markActiveRow(row) {
  document.querySelectorAll('.grid-row').forEach((el, i) => {
    el.classList.toggle('active-row', i === row);
  });
}

// ─── Build keyboard ───────────────────────────────────
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';

  for (const row of KB_ROWS) {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';

    for (const key of row) {
      const btn = document.createElement('button');
      btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.dataset.key = key;
      btn.addEventListener('click', () => handleKey(key));
      rowEl.appendChild(btn);
    }

    kb.appendChild(rowEl);
  }
}

// ─── Update key colors ────────────────────────────────
const PRIORITY = { correct: 3, present: 2, absent: 1 };

function updateKeyColors(guess, results) {
  for (let i = 0; i < guess.length; i++) {
    const letter  = guess[i];
    const result  = results[i];
    const current = keyColors[letter];
    if (!current || PRIORITY[result] > PRIORITY[current]) {
      keyColors[letter] = result;
    }
  }
  renderKeyboard();
}

function renderKeyboard() {
  document.querySelectorAll('.key').forEach(btn => {
    const key   = btn.dataset.key;
    const state = keyColors[key];
    btn.classList.remove('correct', 'present', 'absent');
    if (state) btn.classList.add(state);
  });
}

// ─── Wordle evaluation ────────────────────────────────
function evaluateGuess(guess, answer) {
  const len      = answer.length;
  const result   = Array(len).fill('absent');
  const remAns   = [];
  const remGuess = [];

  for (let i = 0; i < len; i++) {
    if (guess[i] === answer[i]) {
      result[i] = 'correct';
    } else {
      remAns.push(answer[i]);
      remGuess.push({ letter: guess[i], index: i });
    }
  }

  for (const { letter, index } of remGuess) {
    const found = remAns.indexOf(letter);
    if (found !== -1) {
      result[index] = 'present';
      remAns.splice(found, 1);
    }
  }

  return result;
}

// ─── Animations ───────────────────────────────────────
function animateShake(row) {
  const tiles = getTileRow(row);
  tiles.forEach(t => {
    t.classList.remove('row-shake');
    void t.offsetWidth;
    t.classList.add('row-shake');
    t.addEventListener('animationend', () => t.classList.remove('row-shake'), { once: true });
  });
}

function getTileRow(row) {
  const wordLen = currentWord.w.length;
  return Array.from({ length: wordLen }, (_, c) => document.getElementById(`tile-${row}-${c}`));
}

function animateFlip(row, results, onDone) {
  const tiles   = getTileRow(row);
  const wordLen = currentWord.w.length;
  const delay   = 80;

  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('flipping');
      setTimeout(() => {
        tile.classList.remove('flipping');
        tile.classList.add(results[i]);
        tile.classList.add('flipped');
        tile.addEventListener('animationend', () => {
          tile.classList.remove('flipped');
        }, { once: true });

        if (i === wordLen - 1) {
          setTimeout(onDone, 200);
        }
      }, 250);
    }, i * delay);
  });
}

function animateBounce(row) {
  const tiles = getTileRow(row);
  const delay = 60;
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('bounce');
      tile.addEventListener('animationend', () => tile.classList.remove('bounce'), { once: true });
    }, i * delay);
  });
}

// ─── Message ──────────────────────────────────────────
function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className   = type || '';
}

// ─── Crossword UI ─────────────────────────────────────
function computeCwCellSize(cols) {
  const vw   = Math.min(window.innerWidth, 600);
  const pad  = 32;
  const avail = (vw - pad) * (window.innerWidth <= 680 ? 1 : 0.62);
  return Math.max(24, Math.min(40, Math.floor(avail / cols)));
}

function buildCrosswordGrid(puzzle) {
  const { grid, bbox } = puzzle;
  const rows = bbox.maxR - bbox.minR + 1;
  const cols = bbox.maxC - bbox.minC + 1;
  const cellSz = computeCwCellSize(cols);
  document.documentElement.style.setProperty('--cw-cell', cellSz + 'px');

  const container = document.getElementById('crossword-grid');
  container.innerHTML = '';
  container.style.gridTemplateColumns = `repeat(${cols}, var(--cw-cell))`;
  container.style.gridTemplateRows    = `repeat(${rows}, var(--cw-cell))`;

  for (let r = bbox.minR; r <= bbox.maxR; r++) {
    for (let c = bbox.minC; c <= bbox.maxC; c++) {
      const div = document.createElement('div');
      const cell = grid[r][c];
      if (cell === null) {
        div.className = 'cw-cell black';
      } else {
        div.className = 'cw-cell';
        div.dataset.r = r;
        div.dataset.c = c;
        if (cell.number !== null) {
          const num = document.createElement('span');
          num.className   = 'cw-number';
          num.textContent = cell.number;
          div.appendChild(num);
        }
        const letter = document.createElement('span');
        letter.className = 'cw-letter';
        letter.id        = `cwl-${r}-${c}`;
        div.appendChild(letter);
        div.addEventListener('click', () => selectCell(r, c));
      }
      container.appendChild(div);
    }
  }
}

function renderClues(puzzle) {
  const acrossList = document.getElementById('across-clues');
  const downList   = document.getElementById('down-clues');
  acrossList.innerHTML = '';
  downList.innerHTML   = '';

  puzzle.words
    .slice()
    .sort((a, b) => a.number - b.number)
    .forEach(pw => {
      const li  = document.createElement('li');
      li.className = 'clue-item';
      li.dataset.num = pw.number;
      li.dataset.dir = pw.dir;
      li.innerHTML = `<span class="clue-num">${pw.number}${pw.dir === 'across' ? 'A' : 'D'}</span>`
                   + `<span class="clue-text">${pw.entry.en} · ${pw.entry.ar}</span>`;
      li.addEventListener('click', () => {
        selectCell(pw.row, pw.col, pw.dir);
      });
      (pw.dir === 'across' ? acrossList : downList).appendChild(li);
    });
}

function selectCell(r, c, forceDir) {
  const { grid } = currentPuzzle;
  if (grid[r][c] === null) return;

  const cell = grid[r][c];
  // Toggle direction if same cell clicked
  if (!forceDir && selectedCell && selectedCell.r === r && selectedCell.c === c) {
    selectedDir = selectedDir === 'across' ? 'down' : 'across';
  } else if (forceDir) {
    selectedDir = forceDir;
  } else {
    // Prefer direction that has a word
    if (cell.acrossId && !cell.downId) selectedDir = 'across';
    else if (cell.downId && !cell.acrossId) selectedDir = 'down';
    else selectedDir = selectedDir; // keep current
  }
  // If chosen dir has no word here, switch
  if (selectedDir === 'across' && !cell.acrossId && cell.downId) selectedDir = 'down';
  if (selectedDir === 'down'   && !cell.downId   && cell.acrossId) selectedDir = 'across';

  selectedCell = { r, c };
  highlightWord();
  updateClueBar();
}

function highlightWord() {
  if (!selectedCell || !currentPuzzle) return;
  const { grid, bbox } = currentPuzzle;
  // Remove all highlights
  document.querySelectorAll('.cw-cell.word-hl, .cw-cell.cell-hl').forEach(el => {
    el.classList.remove('word-hl', 'cell-hl');
  });
  // Find word bounds
  const wordNum = selectedDir === 'across'
    ? grid[selectedCell.r][selectedCell.c].acrossId
    : grid[selectedCell.r][selectedCell.c].downId;
  if (!wordNum) return;

  const dr = selectedDir === 'down' ? 1 : 0;
  const dc = selectedDir === 'across' ? 1 : 0;
  // Find word start
  const pw = currentPuzzle.words.find(w => w.number === wordNum && w.dir === selectedDir);
  if (!pw) return;

  for (let i = 0; i < pw.entry.w.length; i++) {
    const rr = pw.row + dr * i, cc = pw.col + dc * i;
    const el = cwCellEl(rr, cc, bbox);
    if (el) el.classList.add('word-hl');
  }
  // Selected cell
  const selEl = cwCellEl(selectedCell.r, selectedCell.c, bbox);
  if (selEl) { selEl.classList.remove('word-hl'); selEl.classList.add('cell-hl'); }

  // Update active clue in list
  document.querySelectorAll('.clue-item').forEach(li => li.classList.remove('active'));
  const activeLi = document.querySelector(`.clue-item[data-num="${wordNum}"][data-dir="${selectedDir}"]`);
  if (activeLi) {
    activeLi.classList.add('active');
    activeLi.scrollIntoView({ block: 'nearest' });
  }
}

function cwCellEl(r, c, bbox) {
  const cols = bbox.maxC - bbox.minC + 1;
  const idx  = (r - bbox.minR) * cols + (c - bbox.minC);
  const cells = document.querySelectorAll('#crossword-grid .cw-cell');
  return cells[idx] || null;
}

function updateClueBar() {
  if (!selectedCell || !currentPuzzle) return;
  const { grid } = currentPuzzle;
  const cell     = grid[selectedCell.r][selectedCell.c];
  const wordNum  = selectedDir === 'across' ? cell.acrossId : cell.downId;
  if (!wordNum) return;
  const pw = currentPuzzle.words.find(w => w.number === wordNum && w.dir === selectedDir);
  if (!pw) return;

  document.getElementById('cw-clue-num').textContent = wordNum + (selectedDir === 'across' ? 'A' : 'D');
  document.getElementById('cw-clue-en').textContent  = pw.entry.en;
  document.getElementById('cw-clue-ar').textContent  = pw.entry.ar;
  const badge = document.getElementById('cw-type-badge');
  badge.textContent = pw.entry.type;
  badge.className   = 'type-badge ' + pw.entry.type;
}

function getSelectedWord() {
  if (!selectedCell || !currentPuzzle) return null;
  const { grid } = currentPuzzle;
  const cell     = grid[selectedCell.r][selectedCell.c];
  const wordNum  = selectedDir === 'across' ? cell.acrossId : cell.downId;
  if (!wordNum) return null;
  return currentPuzzle.words.find(w => w.number === wordNum && w.dir === selectedDir) || null;
}

function fillCrosswordLetter(letter) {
  if (!selectedCell || !currentPuzzle) return;
  const { grid } = currentPuzzle;
  grid[selectedCell.r][selectedCell.c].filled = letter;
  const letterEl = document.getElementById(`cwl-${selectedCell.r}-${selectedCell.c}`);
  if (letterEl) letterEl.textContent = letter;
  advanceCursor();
  checkWordComplete();
}

function advanceCursor() {
  const pw = getSelectedWord();
  if (!pw) return;
  const dr = selectedDir === 'down' ? 1 : 0;
  const dc = selectedDir === 'across' ? 1 : 0;
  const { grid } = currentPuzzle;

  // Try to find next unfilled cell in word
  const wordLen = pw.entry.w.length;
  const curOffset = selectedDir === 'down' ? selectedCell.r - pw.row : selectedCell.c - pw.col;

  for (let i = curOffset + 1; i < wordLen; i++) {
    const rr = pw.row + dr * i, cc = pw.col + dc * i;
    if (!grid[rr][cc].filled) {
      selectedCell = { r: rr, c: cc };
      highlightWord();
      updateClueBar();
      return;
    }
  }
  // If no empty cells ahead, just move forward anyway (overwrites)
  if (curOffset + 1 < wordLen) {
    selectedCell = { r: pw.row + dr * (curOffset + 1), c: pw.col + dc * (curOffset + 1) };
    highlightWord();
    updateClueBar();
  } else {
    // At end of word — jump to next unsolved word
    jumpToNextWord();
  }
}

function jumpToNextWord() {
  if (!currentPuzzle) return;
  const unsolved = currentPuzzle.words
    .filter(w => !w.solved)
    .sort((a, b) => a.number - b.number || (a.dir === 'across' ? -1 : 1));
  if (!unsolved.length) return;
  const cur = getSelectedWord();
  const after = cur
    ? unsolved.find(w => w.number > cur.number || (w.number === cur.number && w.dir !== cur.dir && w.dir === 'down'))
    : null;
  const target = after || unsolved[0];
  // Jump to first unfilled cell in that word
  const dr = target.dir === 'down' ? 1 : 0;
  const dc = target.dir === 'across' ? 1 : 0;
  const { grid } = currentPuzzle;
  for (let i = 0; i < target.entry.w.length; i++) {
    const rr = target.row + dr * i, cc = target.col + dc * i;
    if (!grid[rr][cc].filled) {
      selectCell(rr, cc, target.dir);
      return;
    }
  }
  selectCell(target.row, target.col, target.dir);
}

function backspaceCrossword() {
  if (!selectedCell || !currentPuzzle) return;
  const { grid } = currentPuzzle;
  const cell = grid[selectedCell.r][selectedCell.c];

  if (cell.filled) {
    cell.filled = '';
    const letterEl = document.getElementById(`cwl-${selectedCell.r}-${selectedCell.c}`);
    if (letterEl) letterEl.textContent = '';
  } else {
    // Retreat cursor
    const pw = getSelectedWord();
    if (!pw) return;
    const dr = selectedDir === 'down' ? 1 : 0;
    const dc = selectedDir === 'across' ? 1 : 0;
    const curOffset = selectedDir === 'down' ? selectedCell.r - pw.row : selectedCell.c - pw.col;
    if (curOffset > 0) {
      const rr = pw.row + dr * (curOffset - 1), cc = pw.col + dc * (curOffset - 1);
      grid[rr][cc].filled = '';
      const letterEl = document.getElementById(`cwl-${rr}-${cc}`);
      if (letterEl) letterEl.textContent = '';
      selectedCell = { r: rr, c: cc };
      highlightWord();
      updateClueBar();
    }
  }
}

function moveCursor(dr, dc) {
  if (!selectedCell || !currentPuzzle) return;
  const { grid, bbox } = currentPuzzle;
  const nr = selectedCell.r + dr, nc = selectedCell.c + dc;
  if (nr < bbox.minR || nr > bbox.maxR || nc < bbox.minC || nc > bbox.maxC) return;
  if (grid[nr][nc] !== null) {
    selectedCell = { r: nr, c: nc };
    highlightWord();
    updateClueBar();
  }
}

function checkWordComplete() {
  const pw = getSelectedWord();
  if (!pw || pw.solved) return;
  const { grid } = currentPuzzle;
  const dr = selectedDir === 'down' ? 1 : 0;
  const dc = selectedDir === 'across' ? 1 : 0;
  const wordStr = pw.entry.w;
  const allCorrect = wordStr.split('').every((ch, i) => {
    const rr = pw.row + dr * i, cc = pw.col + dc * i;
    return grid[rr][cc].filled === ch;
  });
  if (allCorrect) {
    pw.solved = true;
    // Mark cells green
    wordStr.split('').forEach((_, i) => {
      const rr = pw.row + dr * i, cc = pw.col + dc * i;
      const el = cwCellEl(rr, cc, currentPuzzle.bbox);
      if (el) { el.classList.remove('word-hl', 'cell-hl', 'wrong'); el.classList.add('correct'); }
    });
    // Strikethrough clue
    const li = document.querySelector(`.clue-item[data-num="${pw.number}"][data-dir="${selectedDir}"]`);
    if (li) li.classList.add('solved');
    // Check if all solved
    if (currentPuzzle.words.every(w => w.solved)) endCrossword(true);
  }
}

function checkAllWords() {
  if (!currentPuzzle) return;
  const { grid, words, bbox } = currentPuzzle;
  words.forEach(pw => {
    if (pw.solved) return;
    const dr = pw.dir === 'down' ? 1 : 0;
    const dc = pw.dir === 'across' ? 1 : 0;
    pw.entry.w.split('').forEach((ch, i) => {
      const rr = pw.row + dr * i, cc = pw.col + dc * i;
      const cell = grid[rr][cc];
      if (!cell.filled) return;
      const el = cwCellEl(rr, cc, bbox);
      if (!el || el.classList.contains('correct')) return;
      if (cell.filled !== ch) {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 1500);
      }
    });
  });
}

function revealWord() {
  const pw = getSelectedWord();
  if (!pw) return;
  const { grid, bbox } = currentPuzzle;
  const dr = pw.dir === 'down' ? 1 : 0;
  const dc = pw.dir === 'across' ? 1 : 0;
  pw.entry.w.split('').forEach((ch, i) => {
    const rr = pw.row + dr * i, cc = pw.col + dc * i;
    grid[rr][cc].filled = ch;
    const letterEl = document.getElementById(`cwl-${rr}-${cc}`);
    if (letterEl) letterEl.textContent = ch;
    const el = cwCellEl(rr, cc, bbox);
    if (el) el.classList.add('revealed');
  });
  usedReveal = true;
  pw.solved = true;
  pw.entry.w.split('').forEach((_, i) => {
    const rr = pw.row + dr * i, cc = pw.col + dc * i;
    const el = cwCellEl(rr, cc, bbox);
    if (el) { el.classList.add('correct'); el.classList.add('revealed'); }
  });
  const li = document.querySelector(`.clue-item[data-num="${pw.number}"][data-dir="${pw.dir}"]`);
  if (li) li.classList.add('solved');
  if (currentPuzzle.words.every(w => w.solved)) endCrossword(true);
}

function endCrossword(won) {
  gameOver = true;
  if (won) {
    showMessage('Ausgezeichnet! 🎉', 'win');
    if (!usedReveal) {
      streak.current++;
      if (streak.current > streak.best) streak.best = streak.current;
      saveStreak();
      renderStreak();
    }
  }
  document.getElementById('new-puzzle-btn').classList.remove('hidden');
}

function startCrossword() {
  if (gameMode === '2P') return;
  const pool = words[currentLevel] || [];
  let puzzle = null;
  for (let i = 0; i < 3 && !puzzle; i++) puzzle = generateCrossword(pool);
  if (!puzzle) { showMessage('Could not generate puzzle.', 'lose'); return; }

  currentPuzzle = puzzle;
  gameOver      = false;
  usedReveal    = false;
  animating     = false;

  buildCrosswordGrid(puzzle);
  renderClues(puzzle);
  showMessage('', '');
  document.getElementById('new-puzzle-btn').classList.add('hidden');

  // Select first across word's first cell
  const firstAcross = puzzle.words.find(w => w.dir === 'across');
  if (firstAcross) selectCell(firstAcross.row, firstAcross.col, 'across');
}

// ─── Key handling ─────────────────────────────────────
function handleKey(key) {
  if (gameMode === '2P') {
    // 2P path
    if (gameOver || animating || !currentWord) return;
    if (key === '⌫' || key === 'Backspace') { deleteLetter(); }
    else if (key === 'ENTER' || key === 'Enter') { submitGuess(); }
    else if (/^[A-ZÄÖÜa-zäöüß]$/.test(key)) { addLetter(norm(key)); }
    return;
  }
  // 1P crossword path
  if (gameOver || !currentPuzzle) return;
  if (key === '⌫' || key === 'Backspace') { backspaceCrossword(); }
  else if (key === 'ENTER' || key === 'Enter') { jumpToNextWord(); }
  else if (key === 'ArrowRight') { moveCursor(0, 1); }
  else if (key === 'ArrowLeft')  { moveCursor(0, -1); }
  else if (key === 'ArrowDown')  { moveCursor(1, 0); }
  else if (key === 'ArrowUp')    { moveCursor(-1, 0); }
  else if (/^[A-ZÄÖÜa-zäöüß]$/.test(key)) { fillCrosswordLetter(norm(key)); }
}

function addLetter(letter) {
  const wordLen = currentWord.w.length;
  const row     = board[currentRow];
  if (row.length >= wordLen) return;

  row.push(letter);
  const col  = row.length - 1;
  const tile = document.getElementById(`tile-${currentRow}-${col}`);
  tile.textContent    = letter;
  tile.dataset.letter = letter;

  tile.classList.remove('pop');
  void tile.offsetWidth;
  tile.classList.add('pop');
  tile.addEventListener('animationend', () => tile.classList.remove('pop'), { once: true });
}

function deleteLetter() {
  const row = board[currentRow];
  if (!row.length) return;

  const col  = row.length - 1;
  const tile = document.getElementById(`tile-${currentRow}-${col}`);
  tile.textContent = '';
  delete tile.dataset.letter;
  row.pop();
}

function submitGuess() {
  const wordLen = currentWord.w.length;
  const row     = board[currentRow];

  if (row.length < wordLen) {
    animateShake(currentRow);
    showMessage('Not enough letters', '');
    setTimeout(() => showMessage('', ''), 1200);
    return;
  }

  const guess   = row.join('');
  const answer  = currentWord.w;
  const results = evaluateGuess(guess, answer);

  animating = true;
  animateFlip(currentRow, results, () => {
    animating = false;
    updateKeyColors(guess, results);

    const won  = results.every(r => r === 'correct');
    const last = currentRow === 5;

    if (won) {
      animateBounce(currentRow);
      gameOver = true;
      players[activePlayer].score++;
      updateScoreStrip();
      showMessage(players[activePlayer].name + ' scores! 🎉', 'win');
      if (players[activePlayer].score >= WIN_SCORE_2P) {
        setTimeout(() => end2PGame(activePlayer), 1200);
      } else {
        roundStartPlayer = 1 - activePlayer;
        setTimeout(startRound2P, 1600);
      }
    } else if (last) {
      gameOver = true;
      showMessage('The word was: ' + answer, 'lose');
      roundStartPlayer = 1 - roundStartPlayer;
      setTimeout(startRound2P, 1800);
    } else {
      currentRow++;
      activePlayer = 1 - activePlayer;
      updateTurnBanner();
      updateRowOwnerVisuals();
    }
  });
}

// ─── Mode switching ───────────────────────────────────
function setMode(mode) {
  gameMode = mode;

  const panel       = document.getElementById('wordle-panel');
  const cwClueBar   = document.getElementById('cw-clue-bar');
  const cwArea      = document.getElementById('crossword-area');
  const cwActions   = document.getElementById('cw-actions');
  const streakBar   = document.getElementById('streak-bar');
  const board2p     = document.getElementById('board-2p');
  const panelHdr    = document.getElementById('panel-header');
  const panelHint   = document.getElementById('hint-bar-panel');

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  if (mode === '1P') {
    panel.classList.add('inline-mode');
    panel.classList.remove('visible');
    document.getElementById('panel-backdrop').classList.remove('visible');
    cwClueBar.classList.remove('hidden');
    cwArea.classList.remove('hidden');
    cwActions.classList.remove('hidden');
    streakBar.classList.remove('hidden');
    board2p.classList.add('hidden');
    panelHdr.classList.add('hidden');
    panelHint.classList.add('hidden');
    // Hide the Wordle grid — only keyboard is needed
    document.querySelector('.grid-wrap').classList.add('hidden');
    startCrossword();
  } else {
    panel.classList.add('inline-mode');
    cwClueBar.classList.add('hidden');
    cwArea.classList.add('hidden');
    cwActions.classList.add('hidden');
    streakBar.classList.add('hidden');
    board2p.classList.remove('hidden');
    panelHdr.classList.remove('hidden');
    panelHint.classList.remove('hidden');
    document.getElementById('panel-close-btn').classList.add('hidden');
    document.querySelector('.grid-wrap').classList.remove('hidden');
    showSetupOverlay();
  }
}

// ─── Setup Overlay ────────────────────────────────────
function showSetupOverlay() {
  document.getElementById('setup-overlay').classList.remove('hidden');
}

function hideSetupOverlay() {
  document.getElementById('setup-overlay').classList.add('hidden');
}

// ─── 2P Game ──────────────────────────────────────────
function startGame2P() {
  players[0].name  = document.getElementById('p1-name-input').value.trim() || 'Player 1';
  players[1].name  = document.getElementById('p2-name-input').value.trim() || 'Player 2';
  players[0].score = 0;
  players[1].score = 0;
  activePlayer     = 0;
  roundStartPlayer = 0;

  hideSetupOverlay();
  updateTurnBanner();
  updateScoreStrip();
  startRound2P();
}

function startRound2P() {
  const entry = pickWord(currentLevel, 'all');
  if (!entry) return;

  currentWord = entry;
  currentRow  = 0;
  board       = Array.from({ length: 6 }, () => []);
  gameOver    = false;
  animating   = false;
  keyColors   = {};
  activePlayer = roundStartPlayer;

  // Assign each row to a player: P0 gets even rows, P1 gets odd (relative to start)
  rowOwner = Array.from({ length: 6 }, (_, i) => (roundStartPlayer + i) % 2);

  setTileSize(entry.w.length);
  buildGrid(entry.w.length);
  buildKeyboard();
  renderHint(entry, true);
  showMessage('', '');

  updateTurnBanner();
  updateRowOwnerVisuals();
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  const badge  = document.getElementById('panel-player-badge');
  const p      = players[activePlayer];
  const cls    = activePlayer === 0 ? 'p1' : 'p2';
  banner.textContent = p.name + "'s turn";
  banner.className   = 'turn-banner ' + cls;
  badge.textContent  = p.name;
  badge.style.background = p.color;
}

function updateScoreStrip() {
  document.getElementById('p1-score-label').textContent = players[0].name + ': ' + players[0].score;
  document.getElementById('p2-score-label').textContent = players[1].name + ': ' + players[1].score;
}

function updateRowOwnerVisuals() {
  for (let r = 0; r < 6; r++) {
    const rowEl = document.getElementById(`grid-row-${r}`);
    if (!rowEl) continue;
    rowEl.classList.remove('row-owner-p1', 'row-owner-p2');
    rowEl.classList.add(rowOwner[r] === 0 ? 'row-owner-p1' : 'row-owner-p2');
  }
}

function skipTurn2P() {
  if (gameOver || animating) return;
  const wordLen = currentWord.w.length;
  for (let c = 0; c < wordLen; c++) {
    const tile = document.getElementById(`tile-${currentRow}-${c}`);
    if (tile) { tile.textContent = '–'; tile.classList.add('skipped'); }
  }
  board[currentRow] = [];
  currentRow++;
  if (currentRow > 5) {
    gameOver = true;
    showMessage('The word was: ' + currentWord.w, 'lose');
    roundStartPlayer = 1 - roundStartPlayer;
    setTimeout(startRound2P, 1800);
    return;
  }
  activePlayer = 1 - activePlayer;
  updateTurnBanner();
  updateRowOwnerVisuals();
}

function end2PGame(winnerIndex) {
  gameOver = true;
  const winnerText = winnerIndex !== null
    ? players[winnerIndex].name + ' wins!'
    : "It's a draw!";

  document.getElementById('results-winner').textContent = winnerText;

  const breakdown = document.getElementById('results-breakdown');
  breakdown.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `
      <span class="breakdown-name" style="color:${p.color}">${p.name}</span>
      <span class="breakdown-score">${p.score} / ${WIN_SCORE_2P} points</span>
    `;
    breakdown.appendChild(row);
  });

  document.getElementById('results-overlay').classList.remove('hidden');
}

// ─── Physical keyboard ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (gameMode === '2P' && document.getElementById('setup-overlay').classList.contains('hidden') === false) return;
  handleKey(e.key);
});

// ─── Fetch & init ─────────────────────────────────────
async function init() {
  const loading = document.getElementById('loading');
  try {
    const res  = await fetch('./words.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    words = await res.json();

    const allWords = [...(words.A1||[]), ...(words.A2||[]), ...(words.B1||[])].map(e => e.w);
    const dupes    = allWords.filter((w, i) => allWords.indexOf(w) !== i);
    if (dupes.length) console.warn('Duplicate words found:', dupes);
    else              console.info('Wörtle: no duplicate words found ✓');

    loadStreak();
    setMode('1P');
    loading.classList.add('hidden');
  } catch (err) {
    loading.textContent = 'Failed to load words.json — ' + err.message;
    console.error(err);
  }
}

// Handle resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (gameMode === '1P' && currentPuzzle) {
      const cols = currentPuzzle.bbox.maxC - currentPuzzle.bbox.minC + 1;
      document.documentElement.style.setProperty('--cw-cell', computeCwCellSize(cols) + 'px');
    } else if (gameMode === '2P' && currentWord) {
      setTileSize(currentWord.w.length);
    }
  }, 150);
});

init();
</script>
